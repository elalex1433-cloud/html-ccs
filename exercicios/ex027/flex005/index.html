<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox certralizado</title>
    <style>
        *{ 
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        }
        body{
            background-color: lightpink;
        }
        main{
            background-color: lightseagreen;
            width: 100vw;
            height: 100vh;

            display: flex;
            flex-flow: row nowrap;
            justify-content: center;
            align-items: center;
        }
        section{
            background-color: limegreen;
            height: 200px;
            width: 200px;
            
        }
    </style>
</head>
<body>
   <main>
    <section>
        <h1>Tela De Login</h1>
    </section>
   </main> 
</body>
</html>
