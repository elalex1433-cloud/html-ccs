<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRACIONAL</title>
   <style>
   .container{
   
   border: 3px solid rgb(0, 64, 255);
    display: grid;
    gap: 10px;
    grid-template-rows:repeat(3, 80px);
    grid-template-columns: 20% 5fr 100px;
    grid-auto-flow: row;
   grid-auto-columns: 120px;
   place-items: normal normal;
   place-content:normal normal;
   }
   .item{
    border: 2px solid rgb(0, 208, 52);
    padding: 5px;
   
   }
    
   </style>
</head>
<body>
    <div class="container">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
        
    </div>
</body>
</html>
