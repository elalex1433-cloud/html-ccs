<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
    <style>
        body{
            background-color: cadetblue;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        p{
            color: white;
        }
    </style>
</head>
<body>
    <h1>Teste de formúlario</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
       <p><label for="iusu">Úsuario:</label>
    <input type="text" name="usu" id="iusu" required minlength="5" maxlength="10" autocomplete="name">
    </p>
    <p><label for="isen">Senha:</label>
        <input type="password" name="sen" id="isen" required minlength="5" maxlength="10" autocomplete="current-password">
    </p>
   <input type="submit" value="Enviar">
   <input type="reset" value="Limpar">
</form>
</body>
</html>
